version: 1
command:
  id: account_whoami
  cli_path:
  - account
  - whoami
  summary: Show the signed-in Rimi account name
  complete: true
  description: Return the display name for the currently signed-in Rimi account.
  request:
    method: GET
    url_template: https://www.rimi.ee/epood/api/v1/users/current/greeting
    path_template: /epood/api/v1/users/current/greeting
    path_shape:
    - kind: literal
      value: epood
    - kind: literal
      value: api
    - kind: literal
      value: v1
    - kind: literal
      value: users
    - kind: literal
      value: current
    - kind: literal
      value: greeting
    params: {}
    query: {}
    headers:
      accept: '*/*'
      user-agent: Mozilla/5.0 (compatible; rimi-cli/0.1; +https://www.rimi.ee)
      referer: https://www.rimi.ee/epood/en/my-profile/favourites
    cookies: {}
    body: null
    query_schema:
      type: object
      properties:
        locale:
          type: string
      additionalProperties: false
    headers_schema:
      type: object
      properties:
        accept:
          type: string
        user-agent:
          type: string
        referer:
          type: string
      additionalProperties: false
    body_schema: null
  processors:
    pre: processors.pre
    post: processors.post
  fixtures:
  - id: account_whoami_001
    path: fixtures/account_whoami_001
  goldens:
  - id: account_whoami_001
    path: goldens/account_whoami_001.json
  request_mapping:
    request.query.locale: ee-en
