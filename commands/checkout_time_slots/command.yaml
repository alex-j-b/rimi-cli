version: 1
command:
  id: checkout_time_slots
  cli_path:
  - checkout
  - time-slots
  summary: List checkout time slots
  complete: true
  description: Return available checkout Click & Collect time slots.
  request:
    method: GET
    url_template: https://www.rimi.ee/epood/en/checkout/delivery/collect/time-slots
    path_template: /epood/en/checkout/delivery/collect/time-slots
    path_shape:
    - kind: literal
      value: epood
    - kind: literal
      value: en
    - kind: literal
      value: checkout
    - kind: literal
      value: delivery
    - kind: literal
      value: collect
    - kind: literal
      value: time-slots
    params: {}
    query: {}
    headers:
      accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3;q=0.7
      user-agent: Mozilla/5.0 (compatible; rimi-cli/0.1; +https://www.rimi.ee)
      referer: https://www.rimi.ee/epood/en/checkout
    cookies: {}
    body: null
    query_schema:
      type: object
      properties: {}
      additionalProperties: false
    headers_schema:
      type: object
      properties:
        accept:
          type: string
        user-agent:
          type: string
        referer:
          type: string
      additionalProperties: false
    body_schema: null
  processors:
    pre: processors.pre
    post: processors.post
  fixtures:
  - id: checkout_time_slots_001
    path: fixtures/checkout_time_slots_001
  goldens:
  - id: checkout_time_slots_001
    path: goldens/checkout_time_slots_001.json
  arguments:
  - name: date
    python_name: date
    kind: option
    type: string
    required: false
    default: null
    help: Optional delivery date in YYYY-MM-DD format.
